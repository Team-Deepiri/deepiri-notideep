services:
  discord-github-discussions-bridge:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: deepiri-discussions-bridge
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - LOG_LEVEL=INFO

  discord-auto-invite-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: deepiri-auto-invite-bot
    restart: "no"
    env_file:
      - .env
    environment:
      - LOG_LEVEL=INFO
    command: ["python", "main.py"]
